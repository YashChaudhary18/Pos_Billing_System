# ===============================================================
#  POS Billing System - Application Properties
# ===============================================================


 spring.datasource.url=jdbc:mysql://localhost:3306/pos_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
 spring.datasource.username=root
 spring.datasource.password=1234
 spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect


# ---------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------------
# Server
# ---------------------------------------------------------------
server.port=8080

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
logging.level.com.pos=DEBUG
